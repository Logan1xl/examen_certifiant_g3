spring:
  application:
    name: examen_certifiant_crm_backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

server:
  port: 8087

jwt:
  secret: digitrans-cm-crm-secret-key-2026-must-be-256bits-long
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
